<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoviSup Analytics</title>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial, sans-serif;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-top:20px;
}

.card{
    background:#1e293b;
    border-radius:15px;
    padding:20px;
    text-align:center;
}

.number{
    font-size:40px;
    font-weight:bold;
    margin-top:10px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:30px;
    background:#1e293b;
}

th,td{
    padding:12px;
    border-bottom:1px solid #334155;
    text-align:left;
}

th{
    background:#0f172a;
}
</style>
</head>
<body>

<h1>📊 MoviSup Analytics</h1>

<div class="grid">

<div class="card">
<h3>👥 Usuarios Online</h3>
<div id="online" class="number">0</div>
</div>

<div class="card">
<h3>🧑 Usuarios Únicos</h3>
<div id="unique" class="number">0</div>
</div>

<div class="card">
<h3>🔄 Visitas Totales</h3>
<div id="visits" class="number">0</div>
</div>

</div>

<h2>Visitantes Registrados</h2>

<table>
<thead>
<tr>
<th>ID</th>
<th>Primera Visita</th>
<th>Última Visita</th>
</tr>
</thead>

<tbody id="usersTable"></tbody>

</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
 getDatabase,
 ref,
 onValue
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBZi2SC14v0Nu5mN4c-1KAUoZ0296Y2bf8",
  authDomain: "movisupjs.firebaseapp.com",
  databaseURL: "https://movisupjs-default-rtdb.firebaseio.com",
  projectId: "movisupjs",
  storageBucket: "movisupjs.firebasestorage.app",
  messagingSenderId: "299820640341",
  appId: "1:299820640341:web:1aa2172ea96ff9fc384cdc"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

onValue(ref(db,"online"),(snap)=>{

   const data = snap.val() || {};

   document.getElementById("online").innerText =
   Object.keys(data).length;

});

onValue(ref(db,"stats"),(snap)=>{

   const data = snap.val() || {};

   document.getElementById("unique").innerText =
   data.uniqueUsers || 0;

   document.getElementById("visits").innerText =
   data.visits || 0;

});

onValue(ref(db,"users"),(snap)=>{

   const data = snap.val() || {};

   let html="";

   Object.entries(data).forEach(([id,user])=>{

      const first =
      new Date(user.firstVisit).toLocaleString();

      const last =
      new Date(user.lastVisit).toLocaleString();

      html += `
      <tr>
        <td>${id.substring(0,8)}...</td>
        <td>${first}</td>
        <td>${last}</td>
      </tr>
      `;

   });

   document.getElementById("usersTable").innerHTML = html;

});

</script>

</body>
</html>
