<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MoviSup Admin</title>
<style>
body{
font-family:Arial;
background:#111;
color:white;
padding:20px;
}
.card{
background:#222;
padding:20px;
margin:10px 0;
border-radius:10px;
}
.num{
font-size:40px;
font-weight:bold;
}
</style>
</head>
<body>

<h1>Panel MoviSup</h1>

<div class="card">
Usuarios en línea
<div id="online" class="num">0</div>
</div>

<div class="card">
Visitas totales
<div id="visits" class="num">0</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
getDatabase,
ref,
onValue
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBZi2SC14v0Nu5mN4c-1KAUoZ0296Y2bf8",
  authDomain: "movisupjs.firebaseapp.com",
  databaseURL: "https://movisupjs-default-rtdb.firebaseio.com",
  projectId: "movisupjs",
  storageBucket: "movisupjs.firebasestorage.app",
  messagingSenderId: "299820640341",
  appId: "1:299820640341:web:1aa2172ea96ff9fc384cdc"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

onValue(ref(db,"online"), (snap)=>{
const data = snap.val() || {};
document.getElementById("online").innerText =
Object.keys(data).length;
});

onValue(ref(db,"stats"), (snap)=>{
document.getElementById("visits").innerText =
snap.val()?.visits || 0;
});
</script>

</body>
</html>
