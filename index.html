    <script>
        // URL de tu API en Vercel
        const API_URL = 'https://stream-api-flax-seven.vercel.app/api/scrape';
        
        let events = [];
        let currentEvent = null;
        let currentChannel = 0;

        // Smartlinks
        const smartlinks = [
            'https://www.effectivecpmnetwork.com/f2yzu481?key=1dce1c6e1f95cda91c896cb01166c538',
            'https://www.effectivecpmnetwork.com/dy0tcuvjqc?key=37929a62670a86242ef8f18c67c045a9',
            'https://www.effectivecpmnetwork.com/zx5ayvtg?key=c06a15805c85a193bd2e71b582b1db66',
            'https://www.effectivecpmnetwork.com/gmz9ng2s?key=165935892c923f3f69864ca16c61eefe',
            'https://www.effectivecpmnetwork.com/gmz9ng2s?key=165935892c923f3f69864ca16c61eefe',
            'https://www.effectivecpmnetwork.com/gmz9ng2s?key=165935892c923f3f69864ca16c61eefe'
        ];

        // Variables para control de smartlinks
        let lastSmartlinkTime = 0;
        let smartlinkCooldown = 30000; // 30 segundos en milisegundos

        // Función para manejar clicks y abrir smartlinks
        function handleSmartlinkClick(e) {
            const currentTime = Date.now();
            
            // Verificar si han pasado 30 segundos desde el último smartlink
            if (currentTime - lastSmartlinkTime >= smartlinkCooldown) {
                // Seleccionar un smartlink aleatorio
                const randomIndex = Math.floor(Math.random() * smartlinks.length);
                const selectedSmartlink = smartlinks[randomIndex];
                
                // Abrir en nueva pestaña
                window.open(selectedSmartlink, '_blank');
                
                // Actualizar el tiempo del último smartlink abierto
                lastSmartlinkTime = currentTime;
            }
        }

        // Agregar event listeners para clicks en toda la página
        document.addEventListener('click', handleSmartlinkClick);
        document.addEventListener('contextmenu', handleSmartlinkClick);

        async function loadData() {
            document.getElementById('loadingBox').style.display = 'block';
            document.getElementById('playerBox').style.display = 'none';
            document.getElementById('errorBox').style.display = 'none';
            
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                if (!data.success) throw new Error(data.error);
                
                events = data.eventos;
                console.log('Eventos cargados:', events);
                
                if (events.length === 0) {
                    throw new Error('No se encontraron eventos');
                }
                
                document.getElementById('loadingBox').style.display = 'none';
                document.getElementById('playerBox').style.display = 'block';
                document.getElementById('eventsList').style.display = 'block';
                
                renderEvents();
                
                // Buscar evento con CazeTV para cargar por defecto
                let eventoCazeIndex = -1;
                let canalCazeIndex = -1;
                
                for (let i = 0; i < events.length; i++) {
                    const canalIndex = events[i].canales.findIndex(c => 
                        c.nombre.toLowerCase().includes('caze')
                    );
                    if (canalIndex !== -1) {
                        eventoCazeIndex = i;
                        canalCazeIndex = canalIndex;
                        break;
                    }
                }
                
                // Si encontramos CazeTV, cargarlo. Si no, cargar el primer evento
               // Por esto:
                selectEvent(0, 0);
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loadingBox').style.display = 'none';
                document.getElementById('errorBox').style.display = 'block';
            }
        }

        function renderEvents() {
            const container = document.getElementById('eventsContainer');
            
            const html = events.map((event, index) => `
                <div class="event-item ${currentEvent === index ? 'active' : ''}" 
                     onclick="selectEvent(${index}, 0)">
                    <div class="event-time-box">${event.hora || '--:--'}</div>
                    <div class="event-details">
                        <div class="event-name">${event.titulo}</div>
                        <div class="event-count">📺 ${event.canales.length} canal(es)</div>
                    </div>
                </div>
            `).join('');
            
            container.innerHTML = html;
        }

        function selectEvent(eventIndex, canalIndex = 0) {
            currentEvent = eventIndex;
            currentChannel = canalIndex;
            
            const event = events[eventIndex];
            
            // Actualizar título
            const titleHtml = event.hora 
                ? `${event.titulo} <span class="match-time">${event.hora}</span>`
                : event.titulo;
            document.getElementById('matchTitle').innerHTML = titleHtml;
            
            // Generar botones de canales
            const channelsHtml = event.canales.map((ch, idx) => `
                <button class="channel-btn ${idx === currentChannel ? 'active' : ''}" 
                        onclick="selectChannel(${idx})">
                    ${ch.nombre}
                    <span class="quality">${ch.calidad}</span>
                </button>
            `).join('');
            
            document.getElementById('channelsRow').innerHTML = channelsHtml;
            
            renderEvents();
            loadChannel(canalIndex);
        }

        function selectChannel(index) {
            currentChannel = index;
            
            document.querySelectorAll('.channel-btn').forEach((btn, idx) => {
                btn.classList.toggle('active', idx === index);
            });
            
            loadChannel(index);
        }

        function loadChannel(index) {
            if (currentEvent === null) return;
            
            const event = events[currentEvent];
            const channel = event.canales[index];
            
            document.getElementById('status').textContent = 
                `▶️ ${event.titulo} - ${channel.nombre} (${channel.calidad})`;
            
            const iframe = document.getElementById('streamFrame');
            
            // Cargar URL directamente en el iframe
            console.log('Cargando canal:', channel.nombre, '- URL:', channel.urlOriginal);
            iframe.src = channel.urlOriginal;
        }

        // Iniciar
        loadData();
    </script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
  getDatabase,
  ref,
  set,
  get,
  update,
  onDisconnect,
  runTransaction,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBZi2SC14v0Nu5mN4c-1KAUoZ0296Y2bf8",
  authDomain: "movisupjs.firebaseapp.com",
  databaseURL: "https://movisupjs-default-rtdb.firebaseio.com",
  projectId: "movisupjs",
  storageBucket: "movisupjs.firebasestorage.app",
  messagingSenderId: "299820640341",
  appId: "1:299820640341:web:1aa2172ea96ff9fc384cdc"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ===========================
   ID único por dispositivo
=========================== */

let visitorId = localStorage.getItem("movisup_visitor");

if (!visitorId) {
    visitorId = crypto.randomUUID();
    localStorage.setItem("movisup_visitor", visitorId);
}

/* ===========================
   Usuario
=========================== */

const userRef = ref(db, "users/" + visitorId);

const userSnap = await get(userRef);

if (!userSnap.exists()) {

    await runTransaction(ref(db, "stats/uniqueUsers"), current => {
        return (current || 0) + 1;
    });

    await set(userRef, {
        firstVisit: serverTimestamp(),
        lastVisit: serverTimestamp()
    });

} else {

    const old = userSnap.val();

    await update(userRef, {
        firstVisit: old.firstVisit,
        lastVisit: serverTimestamp()
    });

}

/* ===========================
   Visitas
=========================== */

await runTransaction(ref(db, "stats/visits"), current => {
    return (current || 0) + 1;
});

/* ===========================
   Usuarios Online
=========================== */

const onlineRef = ref(db, "online/" + visitorId);

await set(onlineRef, {
    connected: true,
    lastSeen: serverTimestamp()
});

/* eliminar al desconectarse */

onDisconnect(onlineRef).remove();

/* heartbeat cada 30 segundos */

setInterval(() => {

    update(onlineRef, {
        lastSeen: serverTimestamp()
    });

}, 30000);

</script>
