<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
  getDatabase,
  ref,
  set,
  get,
  update,
  onDisconnect
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBZi2SC14v0Nu5mN4c-1KAUoZ0296Y2bf8",
  authDomain: "movisupjs.firebaseapp.com",
  databaseURL: "https://movisupjs-default-rtdb.firebaseio.com",
  projectId: "movisupjs",
  storageBucket: "movisupjs.firebasestorage.app",
  messagingSenderId: "299820640341",
  appId: "1:299820640341:web:1aa2172ea96ff9fc384cdc"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ========= ID UNICO ========= */

let visitorId = localStorage.getItem("visitorId");

if(!visitorId){
    visitorId = crypto.randomUUID();
    localStorage.setItem("visitorId", visitorId);
}

/* ========= DATOS DE IP ========= */

const ipData = await fetch("https://ipwho.is/")
.then(r=>r.json());

const userRef = ref(db, "users/" + visitorId);

const snap = await get(userRef);

if(!snap.exists()){

    const totalRef = ref(db,"stats");

    const totalSnap = await get(totalRef);

    const total = totalSnap.exists()
        ? (totalSnap.val().uniqueUsers || 0)
        : 0;

    await update(totalRef,{
        uniqueUsers: total + 1
    });

}

await set(userRef,{
    ip: ipData.ip,
    country: ipData.country,
    city: ipData.city,
    firstVisit: snap.exists()
      ? snap.val().firstVisit
      : Date.now(),
    lastVisit: Date.now()
});

/* ========= VISITAS ========= */

const statsRef = ref(db,"stats");

const statsSnap = await get(statsRef);

const visits = statsSnap.exists()
    ? (statsSnap.val().visits || 0)
    : 0;

await update(statsRef,{
    visits: visits + 1
});

/* ========= ONLINE ========= */

const onlineRef = ref(db,"online/" + visitorId);

await set(onlineRef,{
    connected:true
});

onDisconnect(onlineRef).remove();

</script>
