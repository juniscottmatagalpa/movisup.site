<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movisup | Productos Virales</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #0f172a;
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .background {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,.35), transparent 30%),
        radial-gradient(circle at bottom right, rgba(168,85,247,.30), transparent 30%),
        #0f172a;
      z-index: -1;
    }

    .container {
      width: 90%;
      max-width: 1200px;
      margin: auto;
      padding: 40px 0;
    }

    .hero {
      text-align: center;
      margin-bottom: 50px;
    }

    .logo {
      font-size: 42px;
      font-weight: 700;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #60a5fa, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #cbd5e1;
      font-size: 18px;
      margin-bottom: 35px;
    }

    .search-box {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .search-box input {
      width: 320px;
      max-width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: none;
      outline: none;
      background: rgba(255,255,255,.1);
      color: white;
      font-size: 16px;
      backdrop-filter: blur(10px);
    }

    .search-box input::placeholder {
      color: #cbd5e1;
    }

    .search-box button {
      padding: 16px 24px;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      background: linear-gradient(90deg, #3b82f6, #9333ea);
      color: white;
      font-size: 16px;
      font-weight: 600;
      transition: .3s ease;
    }

    .search-box button:hover {
      transform: translateY(-2px);
      opacity: .95;
    }

    .card {
      margin-top: 40px;
      display: none;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 28px;
      overflow: hidden;
      backdrop-filter: blur(14px);
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }

    .card-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      padding: 30px;
    }

    .image-box {
      background: white;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      min-height: 400px;
    }

    .image-box img {
      max-width: 100%;
      max-height: 380px;
      object-fit: contain;
    }

    .info {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .badge {
      display: inline-block;
      background: rgba(34,197,94,.15);
      color: #4ade80;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 14px;
      margin-bottom: 18px;
      width: fit-content;
    }

    .product-title {
      font-size: 34px;
      font-weight: 700;
      margin-bottom: 20px;
      line-height: 1.2;
    }

    .price {
      font-size: 42px;
      font-weight: 700;
      color: #60a5fa;
      margin-bottom: 20px;
    }

    .description {
      color: #cbd5e1;
      line-height: 1.7;
      margin-bottom: 30px;
      font-size: 16px;
    }

    .buy-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      padding: 18px 28px;
      border-radius: 18px;
      text-decoration: none;
      color: white;
      font-weight: 600;
      background: linear-gradient(90deg, #f59e0b, #f97316);
      transition: .3s ease;
      font-size: 17px;
    }

    .buy-btn:hover {
      transform: translateY(-3px);
    }

    .error {
      margin-top: 25px;
      text-align: center;
      color: #fca5a5;
      display: none;
      font-size: 17px;
    }

    .footer {
      margin-top: 70px;
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
    }

    @media(max-width: 900px) {
      .card-content {
        grid-template-columns: 1fr;
      }

      .product-title {
        font-size: 28px;
      }

      .price {
        font-size: 34px;
      }

      .image-box {
        min-height: 300px;
      }
    }
  </style>
</head>
<body>

  <div class="background"></div>

  <div class="container">

    <section class="hero">
      <h1 class="logo">MOVISUP</h1>
      <p class="subtitle">
        Busca el código del producto que viste en TikTok o Instagram.
      </p>

      <div class="search-box">
        <input type="text" id="productCode" placeholder="Ejemplo: A127">
        <button onclick="searchProduct()">Buscar Producto</button>
      </div>

      <div class="error" id="errorMessage">
        Producto no encontrado.
      </div>
    </section>

    <div class="card" id="productCard">
      <div class="card-content">

        <div class="image-box">
          <img id="productImage" src="" alt="Producto">
        </div>

        <div class="info">
          <div class="badge">Producto Viral</div>

          <h2 class="product-title" id="productTitle"></h2>

          <div class="price" id="productPrice"></div>

          <p class="description" id="productDescription"></p>

          <a id="buyButton" class="buy-btn" target="_blank">
            Comprar en Amazon
          </a>
        </div>

      </div>
    </div>

    <div class="footer">
      © 2026 Movisup.site - Productos recomendados
    </div>

  </div>

  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getFirestore,
      doc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


    // =============================
    // PEGA AQUI TU CONFIG FIREBASE
    // =============================

    const firebaseConfig = {
      apiKey: "PEGA_AQUI",
      authDomain: "PEGA_AQUI",
      projectId: "PEGA_AQUI",
      storageBucket: "PEGA_AQUI",
      messagingSenderId: "PEGA_AQUI",
      appId: "PEGA_AQUI"
    };


    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);


    window.searchProduct = async function () {

      const code = document
        .getElementById('productCode')
        .value
        .trim()
        .toUpperCase();

      const productCard = document.getElementById('productCard');
      const errorMessage = document.getElementById('errorMessage');

      if (!code) {
        errorMessage.style.display = 'block';
        errorMessage.innerText = 'Escribe un código.';
        productCard.style.display = 'none';
        return;
      }

      try {

        const docRef = doc(db, 'products', code);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {

          const data = docSnap.data();

          document.getElementById('productImage').src = data.image;
          document.getElementById('productTitle').innerText = data.title;
          document.getElementById('productPrice').innerText = data.price;
          document.getElementById('productDescription').innerText = data.description;
          document.getElementById('buyButton').href = data.link;

          productCard.style.display = 'block';
          errorMessage.style.display = 'none';

        } else {

          productCard.style.display = 'none';
          errorMessage.style.display = 'block';
          errorMessage.innerText = 'Producto no encontrado.';
        }

      } catch (error) {

        console.error(error);

        productCard.style.display = 'none';
        errorMessage.style.display = 'block';
        errorMessage.innerText = 'Error conectando con Firebase.';
      }
    }

  </script>

</body>
</html>
