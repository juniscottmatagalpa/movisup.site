<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
    <style>
        body { margin: 0; background: #000; }
        video { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <video id="video" controls autoplay></video>
    
    <script>
        var url = "https://otte.live.fly.ww.aiv-cdn.net/pdx-nitro/live/clients/dash/enc/qubxnja5rl/out/v1/4ef0db80aa3341e2babb58314541f1e0/cenc.mpd?m=1745870435";
        
        var player = dashjs.MediaPlayer().create();
        
        // Configurar para enviar el referer correcto
        player.setXHRWithCredentialsForType('GET', true);
        
        player.initialize(document.querySelector("#video"), url, true);
    </script>
</body>
</html>
