<script>

async function partido(){

    try{

        let r = await fetch('partido.php');

        let d = await r.json();

        document.getElementById(
        "partidoActual"
        ).innerHTML = d.partido;

        document.getElementById(
        "descripcionPartido"
        ).innerHTML = d.descripcion;

        document.getElementById(
        "descripcionPartido2"
        ).innerHTML = d.descripcion;

    }catch(e){

        console.log(e);

    }

}

partido();

setInterval(partido,300000);

</script>
