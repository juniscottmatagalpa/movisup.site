<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Mega Sport Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#000;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

.player{

position:relative;
width:100%;
max-width:1400px;
background:black;
overflow:hidden;

}

video{

width:100%;
height:auto;
display:block;
background:black;

}

.overlay{

position:absolute;
top:0;
left:0;

width:100%;
height:100%;

display:flex;
justify-content:center;
align-items:center;

pointer-events:none;

}

.loader{

width:60px;
height:60px;

border:5px solid rgba(255,255,255,.2);

border-top:5px solid white;

border-radius:50%;

animation:spin 1s linear infinite;

display:none;

}

@keyframes spin{

100%{
transform:rotate(360deg);
}

}

.controls{

position:absolute;

bottom:0;

width:100%;

padding:12px;

background:linear-gradient(transparent,rgba(0,0,0,.9));

display:flex;

align-items:center;

gap:10px;

}

button{

background:none;

border:none;

color:white;

font-size:22px;

cursor:pointer;

}

input[type=range]{

flex:1;

}

.title{

position:absolute;

top:15px;
left:15px;

background:rgba(0,0,0,.7);

padding:8px 15px;

border-radius:8px;

color:white;

font-weight:bold;

}

</style>

</head>

<body>

<div class="player">

<div class="title">
MEGA SPORT
</div>

<video id="video" playsinline></video>

<div class="overlay">
<div class="loader" id="loader"></div>
</div>

<div class="controls">

<button id="playBtn">▶</button>

<input type="range"
id="volume"
min="0"
max="1"
step="0.1"
value="1">

<button id="fullscreen">
⛶
</button>

</div>

</div>


<script>

const video=document.getElementById("video");

const loader=document.getElementById("loader");

const playBtn=document.getElementById("playBtn");

const volume=document.getElementById("volume");

const fullscreen=document.getElementById("fullscreen");


// Worker que devuelve JSON
const API="https://megasport-worker.juniscottmatagalpa.workers.dev";


async function cargar(){


loader.style.display="block";


const r=await fetch(API);

const data=await r.json();


const url=data.url;


if(Hls.isSupported()){


const hls=new Hls({

enableWorker:true,

lowLatencyMode:true

});


hls.loadSource(url);

hls.attachMedia(video);


hls.on(Hls.Events.MANIFEST_PARSED,()=>{

loader.style.display="none";

video.play();

});


}else{


video.src=url;

loader.style.display="none";

video.play();

}


}


cargar();



playBtn.onclick=()=>{


if(video.paused){

video.play();

playBtn.innerHTML='❚❚';

}
else{

video.pause();

playBtn.innerHTML='▶';

}


};



volume.oninput=()=>{

video.volume=volume.value;

};



fullscreen.onclick=()=>{


if(video.requestFullscreen){

video.requestFullscreen();

}


};


video.addEventListener('waiting',()=>{

loader.style.display='block';

});


video.addEventListener('playing',()=>{

loader.style.display='none';

});


</script>

</body>
</html>
