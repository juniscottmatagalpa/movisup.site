<script src="canales.js"></script>

<script>

function cargar(numero){

    document.getElementById("player").src =
    canales[numero];

}

</script>



<!-- ===================== -->
<!-- OBTENER PARTIDOS -->
<!-- ===================== -->

<script>

async function partido(){

    try{

        let r = await fetch('partido.php');

        let d = await r.json();

        document.getElementById(
        "partidoActual"
        ).innerHTML = d.partido;

        document.getElementById(
        "descripcionPartido"
        ).innerHTML = d.descripcion;

        document.getElementById(
        "descripcionPartido2"
        ).innerHTML = d.descripcion;

    }catch(e){

        console.log(e);

    }

}

partido();

setInterval(partido,300000);

</script>

<script src="partido.js"></script>



<!-- ===================== -->
<!-- ANUNCIO TEMPORIZADO -->
<!-- ===================== -->

<script>

const popup =
document.getElementById('popupAd');


setTimeout(()=>{

    popup.style.display='block';

},60000);



setTimeout(()=>{

    popup.style.display='none';

},240000);



function cerrarAnuncio(){

    popup.style.display='none';

}

</script>
