<!DOCTYPE html>
<html>
<head>
    <title>Stream Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <video id="video" controls width="100%" height="500px"></video>
    
    <script>
        // Función para obtener el stream desde tu API
        async function cargarStream() {
            try {
                // Tu API de Vercel
                const apiUrl = 'https://stream-api-flax-seven.vercel.app/api/get-stream?url=https://vidzenvivo.cc/canal.php?stream=dsports';
                
                const response = await fetch(apiUrl);
                const data = await response.json();
                
                if (data.success) {
                    const video = document.getElementById('video');
                    
                    // Si el navegador soporta HLS nativamente (Safari)
                    if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = data.url;
                    } 
                    // Para otros navegadores usar hls.js
                    else if (Hls.isSupported()) {
                        const hls = new Hls();
                        hls.loadSource(data.url);
                        hls.attachMedia(video);
                        hls.on(Hls.Events.MANIFEST_PARSED, function() {
                            video.play();
                        });
                    }
                } else {
                    console.error('Error:', data.error);
                }
            } catch (e) {
                console.error('Error cargando stream:', e);
            }
        }
        
        cargarStream();
    </script>
</body>
</html>
