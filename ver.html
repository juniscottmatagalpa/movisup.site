<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ver Partidos de Fútbol Gratis en Vivo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            color: #16c79a;
            margin-bottom: 20px;
            font-size: 2rem;
        }
        
        /* SECCIÓN DEL REPRODUCTOR */
        .reproductor-section {
            background: #16213e;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        
        /* Título del partido actual */
        .titulo-partido-box {
            background: #0f3460;
            padding: 15px 20px;
            text-align: center;
            border-bottom: 3px solid #16c79a;
        }
        
        .titulo-partido {
            font-size: 1.3rem;
            font-weight: bold;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .hora-badge {
            background: #e94560;
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        
        /* Botones de canales */
        .canales-box {
            background: #1a1a2e;
            padding: 15px;
            border-bottom: 1px solid #0f3460;
        }
        
        .canales-titulo {
            text-align: center;
            color: #16c79a;
            font-size: 0.9rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .botones-canales {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        
        .btn-canal {
            background: #e94560;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }
        
        .btn-canal:hover {
            background: #ff6b6b;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(233, 69, 96, 0.4);
        }
        
        .btn-canal.activo {
            background: #16c79a;
            box-shadow: 0 4px 12px rgba(22, 199, 154, 0.4);
        }
        
        .calidad-badge {
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
        }
        
        /* Contenedor del video */
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            background: #000;
        }
        
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .info-canal-actual {
            background: #0f3460;
            padding: 10px;
            text-align: center;
            color: #aaa;
            font-size: 0.9rem;
        }
        
        /* LISTA DE EVENTOS - Estilo similar a futbol-libres */
        .lista-section {
            margin-top: 30px;
        }
        
        .lista-header {
            background: #16c79a;
            color: #1a1a2e;
            padding: 12px 20px;
            border-radius: 8px 8px 0 0;
            font-weight: bold;
            text-align: center;
            font-size: 1.1rem;
        }
        
        .evento-card {
            background: #16213e;
            border-left: 4px solid transparent;
            border-bottom: 1px solid #0f3460;
            padding: 0;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .evento-card:hover {
            background: #0f3460;
            border-left-color: #e94560;
        }
        
        .evento-card.activo {
            background: #0f3460;
            border-left-color: #16c79a;
        }
        
        .evento-header {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            gap: 15px;
        }
        
        .evento-hora-box {
            background: #e94560;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1rem;
            min-width: 70px;
            text-align: center;
        }
        
        .evento-info {
            flex: 1;
        }
        
        .evento-titulo {
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 5px;
        }
        
        .evento-canales-count {
            color: #16c79a;
            font-size: 0.85rem;
        }
        
        .evento-flecha {
            color: #16c79a;
            font-size: 1.2rem;
        }
        
        /* Loading y errores */
        .loading {
            text-align: center;
            padding: 50px;
            color: #16c79a;
            font-size: 1.2rem;
        }
        
        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }
        
        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }
        
        .error-box {
            background: #e94560;
            color: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
        }
        
        .btn-recargar {
            background: #16c79a;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
            font-size: 1rem;
        }
        
        .btn-recargar:hover {
            background: #13b386;
        }
        
        .no-eventos {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        
        .mensaje-inicial {
            text-align: center;
            padding: 30px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚽ Ver Fútbol Libre en Vivo</h1>
        
        <!-- SECCIÓN SUPERIOR: Reproductor -->
        <div class="reproductor-section" id="reproductorSection" style="display: none;">
            <!-- 1. Título del partido -->
            <div class="titulo-partido-box">
                <div class="titulo-partido" id="tituloPartido">
                    <span>Selecciona un partido de la lista</span>
                </div>
            </div>
            
            <!-- 2. Botones de canales -->
            <div class="canales-box">
                <div class="canales-titulo">Canales Disponibles</div>
                <div class="botones-canales" id="botonesCanales">
                    <div class="mensaje-inicial">Selecciona un partido para ver los canales</div>
                </div>
            </div>
            
            <!-- 3. Video -->
            <div class="video-container" id="videoContainer">
                <iframe id="videoIframe" src="https://latamvidzfy.org/caze2.php" allowfullscreen allow="autoplay; encrypted-media"></iframe>
            </div>
            
            <div class="info-canal-actual" id="infoCanal">
                Cargando reproductor inicial...
            </div>
        </div>
        
        <!-- Loading -->
        <div id="loadingSection">
            <div class="loading">Cargando agenda de partidos</div>
        </div>
        
        <!-- Error -->
        <div id="errorSection" style="display: none;">
            <div class="error-box">
                ❌ Error al cargar los eventos<br>
                <button class="btn-recargar" onclick="cargarEventos()">
                    🔄 Reintentar
                </button>
            </div>
        </div>
        
        <!-- SECCIÓN INFERIOR: Lista de eventos -->
        <div class="lista-section" id="listaSection" style="display: none;">
            <div class="lista-header">
                📅 Agenda de Partidos
            </div>
            <div id="eventosContainer">
                <!-- Se genera dinámicamente -->
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://stream-api-flax-seven.vercel.app/api/scrape';
        
        let eventosData = [];
        let eventoSeleccionado = null;
        let canalSeleccionado = 0;
        
        async function cargarEventos() {
            document.getElementById('loadingSection').style.display = 'block';
            document.getElementById('reproductorSection').style.display = 'none';
            document.getElementById('errorSection').style.display = 'none';
            document.getElementById('listaSection').style.display = 'none';
            
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                if (!data.success) {
                    throw new Error(data.error || 'Error en la API');
                }
                
                if (data.eventos.length === 0) {
                    document.getElementById('loadingSection').innerHTML = `
                        <div class="no-eventos">
                            📭 No hay eventos disponibles en este momento.<br>
                            <button class="btn-recargar" onclick="cargarEventos()">🔄 Recargar</button>
                        </div>
                    `;
                    return;
                }
                
                eventosData = data.eventos;
                
                // Mostrar secciones
                document.getElementById('loadingSection').style.display = 'none';
                document.getElementById('reproductorSection').style.display = 'block';
                document.getElementById('listaSection').style.display = 'block';
                
                // Renderizar lista de eventos
                renderizarLista();
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loadingSection').style.display = 'none';
                document.getElementById('errorSection').style.display = 'block';
            }
        }
        
        function renderizarLista() {
            const container = document.getElementById('eventosContainer');
            
            if (eventosData.length === 0) {
                container.innerHTML = '<div class="no-eventos">No hay eventos disponibles</div>';
                return;
            }
            
            const html = eventosData.map((evento, index) => `
                <div class="evento-card ${eventoSeleccionado === index ? 'activo' : ''}" 
                     onclick="seleccionarEvento(${index})">
                    <div class="evento-header">
                        <div class="evento-hora-box">${evento.hora || '--:--'}</div>
                        <div class="evento-info">
                            <div class="evento-titulo">${evento.titulo}</div>
                            <div class="evento-canales-count">📺 ${evento.canales.length} canal(es) disponible(s)</div>
                        </div>
                        <div class="evento-flecha">▶</div>
                    </div>
                </div>
            `).join('');
            
            container.innerHTML = html;
        }
        
        function seleccionarEvento(index) {
            eventoSeleccionado = index;
            canalSeleccionado = 0;
            
            const evento = eventosData[index];
            
            // Actualizar título arriba del reproductor
            const tituloHTML = `
                <span>${evento.titulo}</span>
                ${evento.hora ? `<span class="hora-badge">⏰ ${evento.hora}</span>` : ''}
            `;
            document.getElementById('tituloPartido').innerHTML = tituloHTML;
            
            // Generar botones de canales para ESTE evento
            const botonesHTML = evento.canales.map((canal, idx) => `
                <button class="btn-canal ${idx === canalSeleccionado ? 'activo' : ''}" 
                        onclick="cambiarCanal(${idx})">
                    ${canal.nombre}
                    <span class="calidad-badge">${canal.calidad}</span>
                </button>
            `).join('');
            document.getElementById('botonesCanales').innerHTML = botonesHTML;
            
            // Actualizar lista visualmente
            renderizarLista();
            
            // Cargar primer canal automáticamente
            cargarCanal(0);
        }
        
        function cambiarCanal(index) {
            canalSeleccionado = index;
            
            // Actualizar botones visualmente
            const botones = document.querySelectorAll('.btn-canal');
            botones.forEach((btn, idx) => {
                btn.classList.toggle('activo', idx === index);
            });
            
            cargarCanal(index);
        }
        
        function cargarCanal(index) {
            if (eventoSeleccionado === null) return;
            
            const evento = eventosData[eventoSeleccionado];
            const canal = evento.canales[index];
            
            // Actualizar info
            document.getElementById('infoCanal').innerHTML = 
                `Reproduciendo: <strong>${evento.titulo}</strong> | Canal: ${canal.nombre} (${canal.calidad})`;
            
            // CARGAR EL IFRAME CON LA URL DEL CANAL
            // Usamos la URL completa (vidzenvivo.cc/canal.php) no el m3u8 directo
            const iframe = document.getElementById('videoIframe');
            iframe.src = canal.url;
        }
        
        // Iniciar carga
        cargarEventos();
        
        // Recargar cada 5 minutos
        setInterval(cargarEventos, 300000);
    </script>
</body>
</html>
