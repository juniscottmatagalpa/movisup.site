<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ver Partidos de Fútbol Gratis en Vivo</title>
    <!-- hls.js para reproducir streams m3u8 -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            color: #16c79a;
            margin-bottom: 20px;
            font-size: 2rem;
        }
        
        /* Título del partido actual - ARRIBA DEL REPRODUCTOR */
        .titulo-partido-container {
            background: #0f3460;
            border-radius: 12px 12px 0 0;
            padding: 15px 20px;
            text-align: center;
            border-bottom: 2px solid #16c79a;
        }
        
        .titulo-partido {
            font-size: 1.4rem;
            font-weight: bold;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .hora-badge {
            background: #e94560;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        
        /* Botones de canales - ARRIBA DEL REPRODUCTOR */
        .botones-canales-container {
            background: #16213e;
            padding: 15px;
            border-bottom: 1px solid #0f3460;
        }
        
        .botones-canales {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        
        .btn-canal {
            background: #e94560;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }
        
        .btn-canal:hover {
            background: #ff6b6b;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(233, 69, 96, 0.4);
        }
        
        .btn-canal.activo {
            background: #16c79a;
            box-shadow: 0 4px 12px rgba(22, 199, 154, 0.4);
        }
        
        .calidad-badge {
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        
        /* Contenedor del reproductor */
        .reproductor-container {
            background: #16213e;
            border-radius: 0 0 12px 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }
        
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            background: #000;
        }
        
        .video-wrapper video,
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        
        /* Lista de eventos - ABAJO */
        .lista-eventos {
            margin-top: 30px;
        }
        
        .lista-eventos h2 {
            color: #16c79a;
            margin-bottom: 15px;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .evento-item {
            background: #16213e;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .evento-item:hover {
            background: #0f3460;
            border-left-color: #e94560;
            transform: translateX(5px);
        }
        
        .evento-item.activo {
            border-left-color: #16c79a;
            background: #0f3460;
        }
        
        .evento-info {
            flex: 1;
        }
        
        .evento-titulo {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 1rem;
        }
        
        .evento-canales {
            font-size: 0.85rem;
            color: #aaa;
        }
        
        .evento-hora {
            background: #e94560;
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        
        .no-eventos {
            text-align: center;
            padding: 40px;
            color: #888;
            font-size: 1.2rem;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #16c79a;
        }
        
        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }
        
        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }
        
        .error {
            background: #e94560;
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .recargar-btn {
            background: #16c79a;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 1rem;
        }
        
        .recargar-btn:hover {
            background: #13b386;
        }
        
        .info-stream {
            text-align: center;
            color: #888;
            font-size: 0.85rem;
            padding: 10px;
            background: #0f3460;
        }
        
        .mensaje-vacio {
            text-align: center;
            color: #888;
            padding: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚽ Ver Fútbol Gratis en Vivo</h1>
        
        <!-- SECCIÓN SUPERIOR: Título + Botones + Reproductor -->
        <div id="seccion-superior" style="display: none;">
            <!-- 1. Título del partido -->
            <div class="titulo-partido-container">
                <div class="titulo-partido" id="tituloPartido">
                    <span>Cargando...</span>
                </div>
            </div>
            
            <!-- 2. Botones de canales -->
            <div class="botones-canales-container">
                <div class="botones-canales" id="botonesCanales">
                    <!-- Se generan dinámicamente -->
                </div>
            </div>
            
            <!-- 3. Reproductor -->
            <div class="reproductor-container">
                <div class="video-wrapper" id="videoWrapper">
                    <!-- Aquí va el video o iframe -->
                </div>
                <div class="info-stream" id="infoStream">
                    Selecciona un canal para comenzar
                </div>
            </div>
        </div>
        
        <!-- Loading inicial -->
        <div id="loading-inicial">
            <div class="loading">Cargando eventos disponibles</div>
        </div>
        
        <!-- Error -->
        <div id="error-container" style="display: none;">
            <div class="error">
                ❌ Error al cargar eventos<br>
                <button class="recargar-btn" onclick="cargarEventos()">
                    🔄 Reintentar
                </button>
            </div>
        </div>
        
        <!-- SECCIÓN INFERIOR: Lista de eventos -->
        <div class="lista-eventos" id="listaEventos" style="display: none;">
            <h2>📅 Partidos Disponibles</h2>
            <div id="eventosContainer"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://stream-api-flax-seven.vercel.app/api/scrape';
        const PROXY_URL = 'https://stream-api-flax-seven.vercel.app/api/stream?url=';
        const URL_INICIAL = 'https://latamvidzfy.org/caze2.php';
        
        let eventosData = [];
        let eventoSeleccionado = null;
        let canalSeleccionado = 0;
        let hls = null;
        
        // Cargar eventos al iniciar
        async function cargarEventos() {
            document.getElementById('loading-inicial').style.display = 'block';
            document.getElementById('seccion-superior').style.display = 'none';
            document.getElementById('error-container').style.display = 'none';
            
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                if (!data.success) {
                    throw new Error(data.error || 'Error en la API');
                }
                
                if (data.eventos.length === 0) {
                    mostrarSinEventos();
                    return;
                }
                
                eventosData = data.eventos;
                
                // Mostrar sección superior con URL inicial
                document.getElementById('loading-inicial').style.display = 'none';
                document.getElementById('seccion-superior').style.display = 'block';
                document.getElementById('listaEventos').style.display = 'block';
                
                // Cargar URL inicial en el reproductor
                cargarReproductor(URL_INICIAL, 'iframe');
                document.getElementById('tituloPartido').innerHTML = '<span>📺 Selecciona un partido de la lista</span>';
                document.getElementById('botonesCanales').innerHTML = '<div class="mensaje-vacio">Selecciona un partido para ver los canales disponibles</div>';
                document.getElementById('infoStream').textContent = 'Esperando selección...';
                
                // Renderizar lista de eventos
                renderizarListaEventos();
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loading-inicial').style.display = 'none';
                document.getElementById('error-container').style.display = 'block';
            }
        }
        
        function mostrarSinEventos() {
            document.getElementById('loading-inicial').innerHTML = `
                <div class="no-eventos">
                    📭 No hay eventos disponibles en este momento.<br>
                    <button class="recargar-btn" onclick="cargarEventos()" style="margin-top: 15px;">
                        🔄 Recargar
                    </button>
                </div>
            `;
        }
        
        function renderizarListaEventos() {
            const container = document.getElementById('eventosContainer');
            
            const html = eventosData.map((evento, index) => `
                <div class="evento-item ${eventoSeleccionado === index ? 'activo' : ''}" 
                     onclick="seleccionarEvento(${index})">
                    <div class="evento-info">
                        <div class="evento-titulo">${evento.titulo}</div>
                        <div class="evento-canales">📺 ${evento.canales.length} canal(es) disponible(s)</div>
                    </div>
                    ${evento.hora ? `<div class="evento-hora">⏰ ${evento.hora}</div>` : ''}
                </div>
            `).join('');
            
            container.innerHTML = html;
        }
        
        function seleccionarEvento(index) {
            eventoSeleccionado = index;
            canalSeleccionado = 0;
            
            const evento = eventosData[index];
            
            // Actualizar título
            const tituloHTML = `
                <span>${evento.titulo}</span>
                ${evento.hora ? `<span class="hora-badge">⏰ ${evento.hora}</span>` : ''}
            `;
            document.getElementById('tituloPartido').innerHTML = tituloHTML;
            
            // Generar botones de canales
            const botonesHTML = evento.canales.map((canal, idx) => `
                <button class="btn-canal ${idx === canalSeleccionado ? 'activo' : ''}" 
                        onclick="seleccionarCanal(${idx})">
                    ${canal.nombre}
                    <span class="calidad-badge">${canal.calidad}</span>
                </button>
            `).join('');
            document.getElementById('botonesCanales').innerHTML = botonesHTML;
            
            // Actualizar lista visualmente
            renderizarListaEventos();
            
            // Cargar primer canal automáticamente
            cargarCanalActual();
        }
        
        function seleccionarCanal(index) {
            canalSeleccionado = index;
            
            // Actualizar botones visualmente
            const botones = document.querySelectorAll('.btn-canal');
            botones.forEach((btn, idx) => {
                btn.classList.toggle('activo', idx === index);
            });
            
            cargarCanalActual();
        }
        
        function cargarCanalActual() {
            if (eventoSeleccionado === null) return;
            
            const evento = eventosData[eventoSeleccionado];
            const canal = evento.canales[canalSeleccionado];
            
            document.getElementById('infoStream').innerHTML = 
                `Reproduciendo: <strong>${evento.titulo}</strong> - Canal: ${canal.nombre} (${canal.calidad})`;
            
            // Determinar tipo de stream
            if (canal.tipo === 'm3u8' || canal.url.includes('.m3u8') || canal.url.includes('tracks-v')) {
                // Usar proxy para m3u8
                const proxyUrl = PROXY_URL + encodeURIComponent(canal.url);
                cargarReproductor(proxyUrl, 'hls');
            } else if (canal.tipo === 'iframe' || canal.url.includes('.php') || canal.url.includes('embed')) {
                cargarReproductor(canal.url, 'iframe');
            } else {
                cargarReproductor(canal.url, 'iframe');
            }
        }
        
        function cargarReproductor(url, tipo) {
            const wrapper = document.getElementById('videoWrapper');
            
            // Limpiar reproductor anterior
            if (hls) {
                hls.destroy();
                hls = null;
            }
            wrapper.innerHTML = '';
            
            if (tipo === 'hls') {
                // Crear elemento video para HLS
                const video = document.createElement('video');
                video.id = 'videoPlayer';
                video.controls = true;
                video.autoplay = true;
                video.style.width = '100%';
                video.style.height = '100%';
                wrapper.appendChild(video);
                
                if (Hls.isSupported()) {
                    hls = new Hls({
                        enableWorker: true,
                        lowLatencyMode: true,
                    });
                    hls.loadSource(url);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        video.play();
                    });
                    hls.on(Hls.Events.ERROR, function(event, data) {
                        console.error('HLS Error:', data);
                        if (data.fatal) {
                            // Intentar con iframe como fallback
                            cargarReproductor(url.replace(PROXY_URL, ''), 'iframe');
                        }
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url;
                    video.addEventListener('canplay', function() {
                        video.play();
                    });
                }
            } else {
                // Usar iframe para otros tipos
                const iframe = document.createElement('iframe');
                iframe.src = url;
                iframe.allowFullscreen = true;
                iframe.allow = 'autoplay; encrypted-media; fullscreen';
                iframe.style.width = '100%';
                iframe.style.height = '100%';
                iframe.style.border = 'none';
                wrapper.appendChild(iframe);
            }
        }
        
        // Iniciar
        cargarEventos();
        
        // Recargar cada 5 minutos
        setInterval(cargarEventos, 300000);
    </script>
</body>
</html>
