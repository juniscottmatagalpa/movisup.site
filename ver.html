<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fútbol Libre TV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d1117;
            color: #fff;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            color: #00d084;
            margin-bottom: 20px;
        }
        
        .player-section {
            background: #161b22;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 30px;
            border: 1px solid #30363d;
        }
        
        .match-header {
            background: #21262d;
            padding: 15px;
            text-align: center;
            border-bottom: 3px solid #00d084;
        }
        
        .match-title {
            font-size: 1.2rem;
            font-weight: bold;
        }
        
        .time-badge {
            background: #ff4757;
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.9rem;
            margin-left: 10px;
        }
        
        .channels-bar {
            background: #1c2128;
            padding: 15px;
            border-bottom: 1px solid #30363d;
        }
        
        .channels-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        
        .btn-channel {
            background: #ff4757;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        .btn-channel.active {
            background: #00d084;
        }
        
        .quality-tag {
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            margin-left: 5px;
        }
        
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            background: #000;
        }
        
        .video-container video,
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .status-bar {
            background: #21262d;
            padding: 10px;
            text-align: center;
            color: #8b949e;
        }
        
        .events-section {
            margin-top: 30px;
        }
        
        .section-header {
            background: #00d084;
            color: #0d1117;
            padding: 12px;
            border-radius: 8px 8px 0 0;
            font-weight: bold;
            text-align: center;
        }
        
        .event-card {
            background: #161b22;
            border-left: 4px solid transparent;
            border-bottom: 1px solid #30363d;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .event-card:hover {
            background: #21262d;
            border-left-color: #ff4757;
        }
        
        .event-card.active {
            background: #21262d;
            border-left-color: #00d084;
        }
        
        .event-content {
            display: flex;
            align-items: center;
            padding: 15px;
            gap: 15px;
        }
        
        .event-time {
            background: #ff4757;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            min-width: 70px;
            text-align: center;
        }
        
        .event-info {
            flex: 1;
        }
        
        .event-title {
            font-size: 1.1rem;
            font-weight: bold;
        }
        
        .event-meta {
            color: #8b949e;
            font-size: 0.85rem;
        }
        
        .loading, .error-box {
            text-align: center;
            padding: 50px;
        }
        
        .error-box {
            background: #ff4757;
            color: white;
            border-radius: 12px;
            margin: 20px 0;
        }
        
        .btn-retry {
            background: #00d084;
            color: #0d1117;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚽ Fútbol Libre TV</h1>
        
        <div class="player-section" id="playerSection" style="display: none;">
            <div class="match-header">
                <div class="match-title" id="matchTitle">
                    <span>Selecciona un partido</span>
                </div>
            </div>
            
            <div class="channels-bar">
                <div class="channels-buttons" id="channelsButtons"></div>
            </div>
            
            <div class="video-container" id="videoContainer"></div>
            
            <div class="status-bar" id="statusBar">Cargando...</div>
        </div>
        
        <div id="loadingSection">
            <div class="loading" style="color: #00d084;">Cargando agenda...</div>
        </div>
        
        <div id="errorSection" style="display: none;">
            <div class="error-box">
                ❌ Error al cargar<br>
                <button class="btn-retry" onclick="loadEvents()">🔄 Reintentar</button>
            </div>
        </div>
        
        <div class="events-section" id="eventsSection" style="display: none;">
            <div class="section-header">📅 Partidos Disponibles</div>
            <div id="eventsList"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://stream-api-flax-seven.vercel.app/api/scrape';
        
        let eventsData = [];
        let selectedEvent = null;
        let selectedChannel = 0;
        let hls = null;
        
        async function loadEvents() {
            document.getElementById('loadingSection').style.display = 'block';
            document.getElementById('playerSection').style.display = 'none';
            document.getElementById('errorSection').style.display = 'none';
            
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                if (!data.success) throw new Error(data.error);
                
                eventsData = data.eventos;
                console.log('Eventos cargados:', eventsData);
                
                document.getElementById('loadingSection').style.display = 'none';
                document.getElementById('playerSection').style.display = 'block';
                document.getElementById('eventsSection').style.display = 'block';
                
                renderEvents();
                
                if (eventsData.length > 0) {
                    selectEvent(0);
                }
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loadingSection').style.display = 'none';
                document.getElementById('errorSection').style.display = 'block';
            }
        }
        
        function renderEvents() {
            const container = document.getElementById('eventsList');
            
            if (eventsData.length === 0) {
                container.innerHTML = '<div style="padding: 40px; text-align: center; color: #888;">No hay eventos disponibles</div>';
                return;
            }
            
            const html = eventsData.map((event, index) => `
                <div class="event-card ${selectedEvent === index ? 'active' : ''}" 
                     onclick="selectEvent(${index})">
                    <div class="event-content">
                        <div class="event-time">${event.hora || '--:--'}</div>
                        <div class="event-info">
                            <div class="event-title">${event.titulo}</div>
                            <div class="event-meta">📺 ${event.canales.length} canal(es)</div>
                        </div>
                    </div>
                </div>
            `).join('');
            
            container.innerHTML = html;
        }
        
        function selectEvent(index) {
            selectedEvent = index;
            selectedChannel = 0;
            
            const event = eventsData[index];
            
            // Actualizar título
            const titleHtml = event.hora 
                ? `${event.titulo} <span class="time-badge">${event.hora}</span>`
                : event.titulo;
            
            document.getElementById('matchTitle').innerHTML = titleHtml;
            
            // Generar botones de canales
            const buttonsHtml = event.canales.map((channel, idx) => `
                <button class="btn-channel ${idx === selectedChannel ? 'active' : ''}" 
                        onclick="selectChannel(${idx})">
                    ${channel.nombre}
                    <span class="quality-tag">${channel.calidad}</span>
                </button>
            `).join('');
            
            document.getElementById('channelsButtons').innerHTML = buttonsHtml;
            
            renderEvents();
            loadChannel(0);
        }
        
        function selectChannel(index) {
            selectedChannel = index;
            
            const buttons = document.querySelectorAll('.btn-channel');
            buttons.forEach((btn, idx) => {
                btn.classList.toggle('active', idx === index);
            });
            
            loadChannel(index);
        }
        
        function loadChannel(index) {
            if (selectedEvent === null) return;
            
            const event = eventsData[selectedEvent];
            const channel = event.canales[index];
            
            document.getElementById('statusBar').innerHTML = 
                `▶️ ${event.titulo} | ${channel.nombre} (${channel.calidad})`;
            
            const container = document.getElementById('videoContainer');
            
            // Limpiar
            if (hls) {
                hls.destroy();
                hls = null;
            }
            container.innerHTML = '';
            
            // Verificar si es m3u8
            const isM3U8 = channel.url.includes('.m3u8') || channel.url.includes('mono.m3u8');
            
            if (isM3U8 && Hls.isSupported()) {
                // Usar HLS.js
                const video = document.createElement('video');
                video.controls = true;
                video.autoplay = true;
                video.style.width = '100%';
                video.style.height = '100%';
                container.appendChild(video);
                
                hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true
                });
                
                hls.loadSource(channel.proxyUrl);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
                
                hls.on(Hls.Events.ERROR, function(event, data) {
                    console.error('HLS Error:', data);
                    if (data.fatal) {
                        document.getElementById('statusBar').innerHTML = 
                            '❌ Error al cargar. Intenta otro canal.';
                    }
                });
            } else {
                // Usar iframe
                const iframe = document.createElement('iframe');
                iframe.src = channel.url;
                iframe.allowFullscreen = true;
                iframe.allow = 'autoplay; encrypted-media; fullscreen';
                iframe.style.width = '100%';
                iframe.style.height = '100%';
                container.appendChild(iframe);
            }
        }
        
        // Iniciar
        loadEvents();
        setInterval(loadEvents, 300000);
    </script>
</body>
</html>
