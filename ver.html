<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stream de Fútbol</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    h1 {
      text-align: center;
      color: white;
      margin-bottom: 10px;
      font-size: 2.5em;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    
    .subtitle {
      text-align: center;
      color: #ccc;
      margin-bottom: 30px;
    }
    
    .loading {
      text-align: center;
      color: white;
      font-size: 1.2em;
      padding: 40px;
    }
    
    .loading::after {
      content: '';
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #fff;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 1s linear infinite;
      margin-left: 10px;
      vertical-align: middle;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .match-info {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
      color: white;
      text-align: center;
    }
    
    .match-title {
      font-size: 1.5em;
      font-weight: bold;
      margin-bottom: 10px;
    }
    
    .channels-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }
    
    .channel-btn {
      background: linear-gradient(145deg, #28a745, #20c997);
      border: none;
      border-radius: 12px;
      padding: 20px;
      color: white;
      font-size: 1.1em;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      position: relative;
      overflow: hidden;
    }
    
    .channel-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }
    
    .channel-btn:active {
      transform: translateY(0);
    }
    
    .channel-btn::before {
      content: '▶';
      font-size: 1.5em;
      margin-right: 10px;
    }
    
    .channel-btn .quality {
      position: absolute;
      top: 5px;
      right: 10px;
      font-size: 0.7em;
      background: rgba(255,255,255,0.3);
      padding: 2px 8px;
      border-radius: 10px;
    }
    
    .channel-btn .source {
      display: block;
      font-size: 0.75em;
      margin-top: 8px;
      opacity: 0.8;
      font-weight: normal;
    }
    
    .error-message {
      background: rgba(255,0,0,0.2);
      color: #ffcccc;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }
    
    .no-streams {
      text-align: center;
      color: white;
      padding: 40px;
      font-size: 1.2em;
    }
    
    .refresh-btn {
      background: #007bff;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 1em;
      margin-top: 20px;
      transition: all 0.3s;
    }
    
    .refresh-btn:hover {
      background: #0056b3;
      transform: scale(1.05);
    }
    
    /* Modal para el reproductor */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
    }
    
    .modal-content {
      position: relative;
      margin: 5% auto;
      width: 90%;
      max-width: 900px;
      background: #000;
      border-radius: 10px;
      overflow: hidden;
    }
    
    .close {
      position: absolute;
      right: 15px;
      top: 10px;
      color: white;
      font-size: 30px;
      cursor: pointer;
      z-index: 1001;
    }
    
    .video-container {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
    }
    
    .video-container iframe,
    .video-container video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    
    .status-badge {
      display: inline-block;
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 0.9em;
      margin-top: 10px;
    }
    
    .status-online {
      background: #28a745;
    }
    
    .status-offline {
      background: #dc3545;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚽ Stream de Fútbol</h1>
    <p class="subtitle">Canales disponibles en vivo</p>
    
    <div id="content">
      <div class="loading">Buscando transmisiones disponibles</div>
    </div>
  </div>

  <!-- Modal para reproducir streams -->
  <div id="playerModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <div class="video-container" id="videoContainer">
        <!-- El reproductor se inserta aquí -->
      </div>
    </div>
  </div>

  <script>
    // URL de tu API en Vercel
    const API_URL = 'https://stream-nc1v4fbqd-jsinfos-projects.vercel.app/api/scrape';
    
    let currentStreams = [];
    
    // Cargar streams al iniciar
    async function loadStreams() {
      const contentDiv = document.getElementById('content');
      contentDiv.innerHTML = '<div class="loading">Buscando transmisiones disponibles</div>';
      
      try {
        const response = await fetch(API_URL);
        const data = await response.json();
        
        if (!data.success || data.streams.length === 0) {
          contentDiv.innerHTML = `
            <div class="no-streams">
              <p>No se encontraron transmisiones activas en este momento.</p>
              <button class="refresh-btn" onclick="loadStreams()">🔄 Intentar de nuevo</button>
            </div>
          `;
          return;
        }
        
        currentStreams = data.streams;
        displayStreams(data.streams);
        
      } catch (error) {
        console.error('Error:', error);
        contentDiv.innerHTML = `
          <div class="error-message">
            <p>Error al cargar los streams. Intenta de nuevo.</p>
            <button class="refresh-btn" onclick="loadStreams()">🔄 Reintentar</button>
          </div>
        `;
      }
    }
    
    // Mostrar los streams como botones
    function displayStreams(streams) {
      const contentDiv = document.getElementById('content');
      
      // Obtener título del primer stream (asumiendo que todos son del mismo partido)
      const matchTitle = streams[0]?.matchTitle || 'Partido en vivo';
      
      let html = `
        <div class="match-info">
          <div class="match-title">${matchTitle}</div>
          <span class="status-badge status-online">● EN VIVO</span>
          <p style="margin-top: 10px;">${streams.length} canal${streams.length > 1 ? 'es' : ''} disponible${streams.length > 1 ? 's' : ''}</p>
        </div>
        <div class="channels-grid">
      `;
      
      // Crear un botón por cada stream
      streams.forEach((stream, index) => {
        html += `
          <button class="channel-btn" onclick="playStream(${index})">
            <span class="quality">${stream.quality}</span>
            📺 Canal ${index + 1}
            <span class="source">Fuente: ${new URL(stream.source).hostname}</span>
          </button>
        `;
      });
      
      html += `
        </div>
        <div style="text-align: center; margin-top: 30px;">
          <button class="refresh-btn" onclick="loadStreams()">🔄 Actualizar canales</button>
        </div>
      `;
      
      contentDiv.innerHTML = html;
    }
    
    // Reproducir un stream
    function playStream(index) {
      const stream = currentStreams[index];
      if (!stream) return;
      
      const modal = document.getElementById('playerModal');
      const container = document.getElementById('videoContainer');
      
      let playerHtml = '';
      
      if (stream.type === 'iframe') {
        playerHtml = `<iframe src="${stream.url}" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
      } else if (stream.type === 'm3u8') {
        // Para m3u8 necesitarías un reproductor como Video.js o hls.js
        playerHtml = `
          <video id="videoPlayer" controls autoplay style="width:100%; height:100%;">
            <source src="${stream.url}" type="application/x-mpegURL">
            Tu navegador no soporta este formato.
          </video>
        `;
      } else {
        playerHtml = `
          <video controls autoplay style="width:100%; height:100%;">
            <source src="${stream.url}" type="video/mp4">
            Tu navegador no soporta este formato.
          </video>
        `;
      }
      
      container.innerHTML = playerHtml;
      modal.style.display = 'block';
    }
    
    // Cerrar modal
    function closeModal() {
      const modal = document.getElementById('playerModal');
      const container = document.getElementById('videoContainer');
      modal.style.display = 'none';
      container.innerHTML = ''; // Detener reproducción
    }
    
    // Cerrar modal al hacer clic fuera
    window.onclick = function(event) {
      const modal = document.getElementById('playerModal');
      if (event.target === modal) {
        closeModal();
      }
    }
    
    // Cargar al iniciar
    loadStreams();
    
    // Actualizar cada 5 minutos
    setInterval(loadStreams, 300000);
  </script>
</body>
</html>
