<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0f0f0f;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 1000px;
        }
        
        .video-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        
        video {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            display: none;
        }
        
        .error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff4444;
            text-align: center;
            padding: 20px;
            display: none;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .status {
            color: #888;
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📺 Stream Player</h1>
        
        <div class="video-wrapper">
            <video id="video" controls autoplay playsinline></video>
            <div class="loading" id="loading">Cargando...</div>
            <div class="error" id="error">
                Error al cargar el stream.<br>
                Intenta recargar la página.
            </div>
        </div>
        
        <div class="status" id="status">Conectando...</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const status = document.getElementById('status');
        
        // URL de tu API en Vercel
        const STREAM_URL = 'https://stream-api-flax-seven.vercel.app/api/playlist';
        
        function loadStream() {
            loading.style.display = 'block';
            status.textContent = 'Conectando al stream...';
            
            if (Hls.isSupported()) {
                const hls = new Hls({
                    debug: false,
                    enableWorker: true,
                    lowLatencyMode: true,
                    backBufferLength: 90
                });
                
                hls.loadSource(STREAM_URL);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    loading.style.display = 'none';
                    status.textContent = 'Reproduciendo';
                    video.play().catch(e => {
                        console.log('Autoplay bloqueado:', e);
                    });
                });
                
                hls.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) {
                        loading.style.display = 'none';
                        error.style.display = 'block';
                        status.textContent = 'Error de conexión';
                        
                        switch(data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                console.error('Error de red:', data);
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                console.error('Error de media:', data);
                                break;
                            default:
                                console.error('Error:', data);
                        }
                    }
                });
                
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Safari nativo
                video.src = STREAM_URL;
                video.addEventListener('loadedmetadata', function() {
                    loading.style.display = 'none';
                    video.play();
                });
            } else {
                error.style.display = 'block';
                error.innerHTML = 'Tu navegador no soporta HLS.<br>Usa Chrome, Firefox o Safari.';
            }
        }
        
        // Cargar al iniciar
        loadStream();
        
        // Recargar si hay error de red cada 5 segundos
        let retryCount = 0;
        video.addEventListener('error', function() {
            if (retryCount < 3) {
                retryCount++;
                status.textContent = `Reintentando (${retryCount}/3)...`;
                setTimeout(loadStream, 5000);
            }
        });
    </script>
</body>
</html>
