<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fútbol Libre TV</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d1117;
            color: #fff;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            color: #00d084;
            margin-bottom: 20px;
            font-size: 2rem;
        }
        
        .player-section {
            background: #161b22;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 30px;
            border: 1px solid #30363d;
        }
        
        .match-title-bar {
            background: #21262d;
            padding: 15px 20px;
            text-align: center;
            border-bottom: 3px solid #00d084;
        }
        
        .match-title {
            font-size: 1.3rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .time-badge {
            background: #ff4757;
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.9rem;
        }
        
        .channels-bar {
            background: #1c2128;
            padding: 15px;
            border-bottom: 1px solid #30363d;
        }
        
        .channels-label {
            text-align: center;
            color: #8b949e;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }
        
        .channels-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        
        .btn-channel {
            background: #ff4757;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        
        .btn-channel:hover {
            background: #ff6b81;
            transform: translateY(-2px);
        }
        
        .btn-channel.active {
            background: #00d084;
        }
        
        .quality-tag {
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            margin-left: 5px;
        }
        
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            background: #000;
        }
        
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .channel-info {
            background: #21262d;
            padding: 10px;
            text-align: center;
            color: #8b949e;
        }
        
        .events-section {
            margin-top: 30px;
        }
        
        .section-header {
            background: #00d084;
            color: #0d1117;
            padding: 12px 20px;
            border-radius: 8px 8px 0 0;
            font-weight: bold;
            text-align: center;
        }
        
        .event-card {
            background: #161b22;
            border-left: 4px solid transparent;
            border-bottom: 1px solid #30363d;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .event-card:hover {
            background: #21262d;
            border-left-color: #ff4757;
        }
        
        .event-card.active {
            background: #21262d;
            border-left-color: #00d084;
        }
        
        .event-content {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            gap: 15px;
        }
        
        .event-time {
            background: #ff4757;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            min-width: 70px;
            text-align: center;
        }
        
        .event-details {
            flex: 1;
        }
        
        .event-title {
            font-size: 1.1rem;
            font-weight: bold;
        }
        
        .event-meta {
            color: #8b949e;
            font-size: 0.85rem;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #00d084;
        }
        
        .error-box {
            background: #ff4757;
            color: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            margin: 20px 0;
        }
        
        .btn-retry {
            background: #00d084;
            color: #0d1117;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚽ Fútbol Libre TV</h1>
        
        <div class="player-section" id="playerSection" style="display: none;">
            <div class="match-title-bar">
                <div class="match-title" id="matchTitle">
                    <span>Cargando...</span>
                </div>
            </div>
            
            <div class="channels-bar">
                <div class="channels-label">Selecciona un canal</div>
                <div class="channels-buttons" id="channelsButtons"></div>
            </div>
            
            <div class="video-wrapper" id="videoWrapper">
                <iframe id="videoFrame" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
            </div>
            
            <div class="channel-info" id="channelInfo">Selecciona un partido</div>
        </div>
        
        <div id="loadingSection">
            <div class="loading">Cargando agenda...</div>
        </div>
        
        <div id="errorSection" style="display: none;">
            <div class="error-box">
                ❌ Error al cargar<br>
                <button class="btn-retry" onclick="loadEvents()">🔄 Reintentar</button>
            </div>
        </div>
        
        <div class="events-section" id="eventsSection" style="display: none;">
            <div class="section-header">📅 Partidos Disponibles</div>
            <div id="eventsList"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://stream-api-flax-seven.vercel.app/api/scrape';
        
        let eventsData = [];
        let selectedEvent = null;
        let selectedChannel = 0;
        
        async function loadEvents() {
            document.getElementById('loadingSection').style.display = 'block';
            document.getElementById('playerSection').style.display = 'none';
            document.getElementById('errorSection').style.display = 'none';
            document.getElementById('eventsSection').style.display = 'none';
            
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                if (!data.success) throw new Error(data.error);
                
                eventsData = data.eventos;
                
                document.getElementById('loadingSection').style.display = 'none';
                document.getElementById('playerSection').style.display = 'block';
                document.getElementById('eventsSection').style.display = 'block';
                
                renderEvents();
                
                if (eventsData.length > 0) {
                    selectEvent(0);
                }
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loadingSection').style.display = 'none';
                document.getElementById('errorSection').style.display = 'block';
            }
        }
        
        function renderEvents() {
            const container = document.getElementById('eventsList');
            
            const html = eventsData.map((event, index) => `
                <div class="event-card ${selectedEvent === index ? 'active' : ''}" 
                     onclick="selectEvent(${index})">
                    <div class="event-content">
                        <div class="event-time">${event.hora || '--:--'}</div>
                        <div class="event-details">
                            <div class="event-title">${event.titulo}</div>
                            <div class="event-meta">📺 ${event.canales.length} canal(es)</div>
                        </div>
                    </div>
                </div>
            `).join('');
            
            container.innerHTML = html;
        }
        
        function selectEvent(index) {
            selectedEvent = index;
            selectedChannel = 0;
            
            const event = eventsData[index];
            
            document.getElementById('matchTitle').innerHTML = `
                <span>${event.titulo}</span>
                ${event.hora ? `<span class="time-badge">⏰ ${event.hora}</span>` : ''}
            `;
            
            const buttonsHtml = event.canales.map((channel, idx) => `
                <button class="btn-channel ${idx === selectedChannel ? 'active' : ''}" 
                        onclick="selectChannel(${idx})">
                    ${channel.nombre}
                    <span class="quality-tag">${channel.calidad}</span>
                </button>
            `).join('');
            
            document.getElementById('channelsButtons').innerHTML = buttonsHtml;
            
            renderEvents();
            loadChannel(0);
        }
        
        function selectChannel(index) {
            selectedChannel = index;
            
            const buttons = document.querySelectorAll('.btn-channel');
            buttons.forEach((btn, idx) => {
                btn.classList.toggle('active', idx === index);
            });
            
            loadChannel(index);
        }
        
        function loadChannel(index) {
            if (selectedEvent === null) return;
            
            const event = eventsData[selectedEvent];
            const channel = event.canales[index];
            
            document.getElementById('channelInfo').innerHTML = 
                `▶️ ${event.titulo} | ${channel.nombre}`;
            
            // USAR EL PROXY - esto evita el bloqueo de referer
            document.getElementById('videoFrame').src = channel.proxyUrl;
        }
        
        loadEvents();
        setInterval(loadEvents, 300000);
    </script>
</body>
</html>
