<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fútbol Libre - Eventos en Vivo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            color: #16c79a;
            margin-bottom: 20px;
            font-size: 2rem;
        }
        
        .evento-actual {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .titulo-partido {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #fff;
            padding: 10px;
            background: #0f3460;
            border-radius: 8px;
        }
        
        .hora-badge {
            background: #e94560;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-left: 10px;
        }
        
        .botones-canales {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 15px;
        }
        
        .btn-canal {
            background: #e94560;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }
        
        .btn-canal:hover {
            background: #ff6b6b;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(233, 69, 96, 0.4);
        }
        
        .btn-canal.activo {
            background: #16c79a;
            box-shadow: 0 4px 12px rgba(22, 199, 154, 0.4);
        }
        
        .calidad-badge {
            background: rgba(255,255,255,0.2);
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        
        .iframe-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            background: #000;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        
        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .lista-eventos {
            margin-top: 30px;
        }
        
        .lista-eventos h2 {
            color: #16c79a;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }
        
        .evento-item {
            background: #16213e;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
        }
        
        .evento-item:hover {
            background: #0f3460;
            border-left-color: #e94560;
        }
        
        .evento-item.activo {
            border-left-color: #16c79a;
            background: #0f3460;
        }
        
        .evento-titulo {
            font-weight: bold;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
        }
        
        .evento-hora {
            background: #e94560;
            color: white;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 0.8rem;
            margin-left: auto;
        }
        
        .evento-canales {
            font-size: 0.85rem;
            color: #aaa;
        }
        
        .no-eventos {
            text-align: center;
            padding: 40px;
            color: #888;
            font-size: 1.2rem;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #16c79a;
        }
        
        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }
        
        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }
        
        .error {
            background: #e94560;
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .recargar-btn {
            background: #16c79a;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 1rem;
        }
        
        .recargar-btn:hover {
            background: #13b386;
        }
        
        .info-canales {
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            margin-top: 10px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚽ Fútbol Libre - Eventos en Vivo</h1>
        
        <div id="contenido">
            <div class="loading">Cargando eventos</div>
        </div>
        
        <div class="lista-eventos" id="listaEventos" style="display: none;">
            <h2>📅 Todos los Eventos</h2>
            <div id="eventosContainer"></div>
        </div>
    </div>

    <script>
        // URL de tu API en Vercel - REEMPLAZAR con tu URL real
        const API_URL = 'https://stream-api-junisprojects.vercel.app/api/scrape';
        
        let eventosData = [];
        let eventoSeleccionado = 0;
        let canalSeleccionado = 0;
        
        async function cargarEventos() {
            const contenidoDiv = document.getElementById('contenido');
            contenidoDiv.innerHTML = '<div class="loading">Cargando eventos</div>';
            
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                if (!data.success) {
                    throw new Error(data.error || 'Error en la API');
                }
                
                if (data.eventos.length === 0) {
                    mostrarSinEventos();
                    return;
                }
                
                eventosData = data.eventos;
                eventoSeleccionado = 0;
                canalSeleccionado = 0;
                renderizar();
                
            } catch (error) {
                console.error('Error:', error);
                contenidoDiv.innerHTML = `
                    <div class="error">
                        ❌ Error al cargar eventos: ${error.message}<br>
                        <button class="recargar-btn" onclick="cargarEventos()">
                            🔄 Reintentar
                        </button>
                    </div>
                `;
            }
        }
        
        function mostrarSinEventos() {
            document.getElementById('contenido').innerHTML = `
                <div class="no-eventos">
                    📭 No hay eventos disponibles en este momento.<br>
                    <button class="recargar-btn" onclick="cargarEventos()" style="margin-top: 15px;">
                        🔄 Recargar
                    </button>
                </div>
            `;
            document.getElementById('listaEventos').style.display = 'none';
        }
        
        function renderizar() {
            if (eventosData.length === 0) {
                mostrarSinEventos();
                return;
            }
            
            const evento = eventosData[eventoSeleccionado];
            
            // Verificar que el evento tenga canales
            if (!evento.canales || evento.canales.length === 0) {
                document.getElementById('contenido').innerHTML = `
                    <div class="error">
                        ⚠️ El evento no tiene canales disponibles
                    </div>
                `;
                return;
            }
            
            const canal = evento.canales[canalSeleccionado];
            
            // Generar botones de canales dinámicamente según la cantidad de canales
            const botonesHTML = evento.canales.map((c, index) => `
                <button class="btn-canal ${index === canalSeleccionado ? 'activo' : ''}" 
                        onclick="cambiarCanal(${index})"
                        title="${c.nombre}">
                    ${c.nombre}
                    <span class="calidad-badge">${c.calidad}</span>
                </button>
            `).join('');
            
            // HTML del reproductor
            const contenidoHTML = `
                <div class="evento-actual">
                    <div class="titulo-partido">
                        ${evento.titulo}
                        ${evento.hora ? `<span class="hora-badge">⏰ ${evento.hora}</span>` : ''}
                    </div>
                    
                    <div class="botones-canales">
                        ${botonesHTML}
                    </div>
                    
                    <div class="info-canales">
                        📺 ${evento.canales.length} canal(es) disponible(s) | 
                        Canal actual: <strong>${canal.nombre}</strong> (${canal.calidad})
                    </div>
                    
                    <div class="iframe-container">
                        <iframe src="${canal.url}" 
                                allowfullscreen 
                                allow="autoplay; encrypted-media"
                                sandbox="allow-same-origin allow-scripts allow-popups allow-forms">
                        </iframe>
                    </div>
                </div>
            `;
            
            document.getElementById('contenido').innerHTML = contenidoHTML;
            
            // Renderizar lista de eventos si hay más de uno
            if (eventosData.length > 1) {
                const eventosListaHTML = eventosData.map((e, index) => `
                    <div class="evento-item ${index === eventoSeleccionado ? 'activo' : ''}" 
                         onclick="cambiarEvento(${index})">
                        <div class="evento-titulo">
                            ${e.titulo}
                            ${e.hora ? `<span class="evento-hora">${e.hora}</span>` : ''}
                        </div>
                        <div class="evento-canales">${e.canales.length} canal(es) disponible(s)</div>
                    </div>
                `).join('');
                
                document.getElementById('eventosContainer').innerHTML = eventosListaHTML;
                document.getElementById('listaEventos').style.display = 'block';
            } else {
                document.getElementById('listaEventos').style.display = 'none';
            }
        }
        
        function cambiarCanal(index) {
            canalSeleccionado = index;
            renderizar();
        }
        
        function cambiarEvento(index) {
            eventoSeleccionado = index;
            canalSeleccionado = 0; // Resetear al primer canal
            renderizar();
        }
        
        // Cargar al iniciar
        cargarEventos();
        
        // Recargar cada 5 minutos para actualizar eventos
        setInterval(cargarEventos, 300000);
    </script>
</body>
</html>
