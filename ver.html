<!DOCTYPE html>
<html>
<head>
    <title>Mi Stream</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        #capturador {
            width: 1px;
            height: 1px;
            opacity: 0;
            position: absolute;
            pointer-events: none;
        }
        #video-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }
        video {
            width: 100%;
            height: auto;
        }
        #loading {
            text-align: center;
            padding: 20px;
            font-family: Arial;
        }
    </style>
</head>
<body>
    <div id="loading">Obteniendo stream...</div>
    
    <!-- Iframe invisible que carga el proxy -->
    <iframe id="capturador" 
        src="https://stream-api-flax-seven.vercel.app/api/proxy"
        style="width:1px;height:1px;opacity:0;position:absolute;">
</iframe>
    
    <!-- Tu reproductor -->
    <div id="video-container" style="display:none;">
        <video id="video" controls width="100%"></video>
    </div>

    <script>
        // Escuchar mensajes del iframe (el espía)
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'STREAM_URL') {
                const m3u8Url = event.data.url;
                console.log('URL capturada:', m3u8Url);
                
                // Ocultar loading, mostrar video
                document.getElementById('loading').style.display = 'none';
                document.getElementById('video-container').style.display = 'block';
                
                // Cargar en el reproductor
                const video = document.getElementById('video');
                
                if (Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(m3u8Url);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        video.play();
                    });
                    hls.on(Hls.Events.ERROR, function(event, data) {
                        console.error('Error HLS:', data);
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = m3u8Url;
                    video.addEventListener('loadedmetadata', function() {
                        video.play();
                    });
                }
            }
        });
        
        // Timeout por si falla
        setTimeout(() => {
            if (document.getElementById('video-container').style.display === 'none') {
                document.getElementById('loading').innerHTML = 
                    'Error al obtener el stream. <a href="https://vidzenvivo.cc/canal.php?stream=dsports" target="_blank">Ver directo</a>';
            }
        }, 15000); // 15 segundos
    </script>
</body>
</html>
