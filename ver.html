<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream en Vivo</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #00d4ff;
        }

        .status {
            text-align: center;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            font-weight: bold;
        }

        .status.loading {
            background: rgba(255, 170, 0, 0.2);
            color: #ffaa00;
        }

        .status.ready {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }

        .status.error {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
        }

        #playerContainer {
            display: none;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
        }

        video {
            width: 100%;
            display: block;
        }

        .controls {
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .btn-primary {
            background: #00d4ff;
            color: #000;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        #errorContainer {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .iframe-container {
            margin-top: 20px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #00d4ff;
        }

        iframe {
            width: 100%;
            height: 500px;
            border: none;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📺 Stream en Vivo</h1>
        
        <div id="status" class="status loading">
            <span class="spinner"></span>
            Cargando stream...
        </div>

        <div id="playerContainer">
            <video id="video" controls></video>
            <div class="controls">
                <button class="btn-primary" onclick="loadStream()">🔄 Recargar</button>
                <button class="btn-secondary" onclick="showIframe()">📺 Ver en iframe</button>
            </div>
        </div>

        <div id="errorContainer">
            <p>No se pudo cargar el stream directo.</p>
            <p>Usando iframe alternativo:</p>
            <div class="iframe-container">
                <iframe src="https://futbol-libres.su/eventos.html?r=aHR0cHM6Ly92aWR6ZW52aXZvLmNjL2NhbmFsLnBocD9zdHJlYW09ZHNwb3J0cw=="></iframe>
            </div>
        </div>
    </div>

    <script>
        // URL de tu API en Vercel
        const API_URL = 'https://stream-api-flax-seven.vercel.app/api/get-stream';

        async function loadStream() {
            const statusDiv = document.getElementById('status');
            const playerDiv = document.getElementById('playerContainer');
            const errorDiv = document.getElementById('errorContainer');
            
            statusDiv.className = 'status loading';
            statusDiv.innerHTML = '<span class="spinner"></span> Buscando stream...';
            playerDiv.style.display = 'none';
            errorDiv.style.display = 'none';

            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                if (data.success && data.url) {
                    statusDiv.className = 'status ready';
                    statusDiv.textContent = '✅ Stream cargado';
                    playerDiv.style.display = 'block';
                    
                    const video = document.getElementById('video');
                    
                    if (Hls.isSupported()) {
                        const hls = new Hls();
                        hls.loadSource(data.url);
                        hls.attachMedia(video);
                        hls.on(Hls.Events.MANIFEST_PARSED, function() {
                            video.play();
                        });
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = data.url;
                        video.addEventListener('loadedmetadata', function() {
                            video.play();
                        });
                    }
                } else {
                    throw new Error(data.error || 'No se encontró el stream');
                }
            } catch (err) {
                statusDiv.className = 'status error';
                statusDiv.textContent = '❌ Error: ' + err.message;
                errorDiv.style.display = 'block';
            }
        }

        function showIframe() {
            document.getElementById('playerContainer').style.display = 'none';
            document.getElementById('errorContainer').style.display = 'block';
            document.getElementById('status').style.display = 'none';
        }

        // Cargar automáticamente al entrar
        window.onload = loadStream;
    </script>
</body>
</html>
