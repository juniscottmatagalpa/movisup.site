<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100vw;
            height: 100vh;
            background: #ffffff;
        }
    </style>
</head>
<body>
    <script>
        // Array con todos los smartlinks
        const smartlinks = [
            "https://www.effectivecpmnetwork.com/zx5ayvtg?key=c06a15805c85a193bd2e71b582b1db66",
            "https://www.effectivecpmnetwork.com/hbz84qteb5?key=c278c9111da2781e8553f8f5fc671b1a",
            "https://www.effectivecpmnetwork.com/jdv45n3g?key=058f6616a7d835252588ac843e67d8b4",
            "https://www.effectivecpmnetwork.com/mk7dpx1y9n?key=fdcc569f41598ea5f5c60950c55e207a",
            "https://www.effectivecpmnetwork.com/nix3ry11zs?key=5d8813a81158a32dae418bac759314de",
            "https://www.effectivecpmnetwork.com/ft8adzvc?key=93f1fe9c2927225593625c5f4e03ab5f",
            "https://www.effectivecpmnetwork.com/xb6bwwsp?key=d92237971cb08aa20322cf0e80832bee",
            "https://www.effectivecpmnetwork.com/v612a8sie?key=34069832488e73cf23a5ac6f3caffa00"
        ];
        
        // Función para seleccionar un smartlink aleatorio
        function getRandomSmartlink() {
            const randomIndex = Math.floor(Math.random() * smartlinks.length);
            return smartlinks[randomIndex];
        }
        
        // Función para abrir el smartlink
        function openRandomSmartlink() {
            const url = getRandomSmartlink();
            window.open(url, '_blank');
        }
        
        // Abrir el primero inmediatamente al cargar
        openRandomSmartlink();
        
        // Luego abrir uno aleatorio cada 10 segundos
        setInterval(openRandomSmartlink, 10000);
    </script>
</body>
</html>
