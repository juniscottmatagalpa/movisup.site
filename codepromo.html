<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargando...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100vw;
            height: 100vh;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }
        
        .loader {
            text-align: center;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .message {
            color: #333;
            font-size: 16px;
        }
        
        .countdown {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <div class="message">Cargando contenido...</div>
        <div class="countdown" id="countdown">Iniciando en 10 segundos...</div>
    </div>

    <script>
        // URL del smartlink
        const smartlink = "https://www.effectivecpmnetwork.com/zx5ayvtg?key=c06a15805c85a193bd2e71b582b1db66";
        
        // Contador visual
        let timeLeft = 10;
        const countdownEl = document.getElementById('countdown');
        
        const countdownInterval = setInterval(() => {
            timeLeft--;
            if (timeLeft > 0) {
                countdownEl.textContent = `Iniciando en ${timeLeft} segundos...`;
            } else {
                clearInterval(countdownInterval);
                countdownEl.textContent = "Abriendo anuncios...";
            }
        }, 1000);
        
        // Función para abrir el smartlink
        function openSmartlink() {
            window.open(smartlink, '_blank');
        }
        
        // Primera apertura después de 10 segundos
        setTimeout(() => {
            openSmartlink();
            
            // Luego abrir cada 5 segundos
            setInterval(() => {
                openSmartlink();
            }, 5000);
            
        }, 10000);
    </script>
</body>
</html>
