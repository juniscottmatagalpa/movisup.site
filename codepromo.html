<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100vw;
            height: 100vh;
            background: #ffffff;
        }
    </style>
</head>
<body>
    <script>
        // Array con todos los smartlinks
        const smartlinks = [
            "https://omg10.com/4/11232134",
              "https://omg10.com/4/11232134",
              "https://omg10.com/4/11232134",
              "https://omg10.com/4/11232134",
              "https://omg10.com/4/11232134",
              "https://omg10.com/4/11232134",
              "https://omg10.com/4/11232134",
              "https://omg10.com/4/11232134",
            
        ];
        
        // Función para seleccionar un smartlink aleatorio
        function getRandomSmartlink() {
            const randomIndex = Math.floor(Math.random() * smartlinks.length);
            return smartlinks[randomIndex];
        }
        
        // Función para abrir el smartlink
        function openRandomSmartlink() {
            const url = getRandomSmartlink();
            window.open(url, '_blank');
        }
        
        // Abrir el primero inmediatamente al cargar
        openRandomSmartlink();
        
        // Luego abrir uno aleatorio cada 10 segundos
        setInterval(openRandomSmartlink, 10000);
    </script>
</body>
</html>
